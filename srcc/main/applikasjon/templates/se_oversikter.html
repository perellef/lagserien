{% extends "base_admin.html" %}

{% block innhold %}

<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{{ url_for('adminside') }}">Adminside</a></li>
    <li class="breadcrumb-item active" aria-current="page">Se oversikter</li>
  </ol>
</nav>

<h3>Se oversikter</h3>

<div>
  <canvas id="myChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
<script>
  const ctx = document.getElementById('myChart');

  const besøkstall_per_dag = {{ besøkstall|tojson }}

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: besøkstall_per_dag.map(par => par[0]),
      datasets: [{
        label: 'Besøkstall per dag',
        data: besøkstall_per_dag.map(par => par[1]),
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>


<div class="table-container forsinkelser" style="max-height: 300px; overflow-y: auto;">
  <table class="table table-sm" style="table-layout: fixed">   
    <thead class="table-light">
      <tr>
        <th scope="col" style="width: 13%; white-space: nowrap; overflow:hidden; text-overflow: ellipsis">Forsinkelse</th>
        <th scope="col" style="width: 50%">Stevne</th>
        <th scope="col" style="width: 24%">Arena</th>
        <th scope="col" style="width: 15%">Dato</th>
      </tr>
    </thead>
    <tbody id="forsinkelser">
    </tbody>
  </table>
</div>
<script src="{{ url_for('static', filename='se_oversikter.js') }}"></script>

{% endblock %}
